<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado do Checkout</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:30px;
}

.caixa{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:8px;
}

h1{
    color:#0d6efd;
}
</style>
</head>
<body>

<div class="caixa">

<h1>Pedido Recebido!</h1>

<p><strong>Nome:</strong> <span id="nome"></span></p>

<p><strong>Sobrenome:</strong> <span id="sobrenome"></span></p>

<p><strong>Usuário:</strong> <span id="usuario"></span></p>

<p><strong>E-mail:</strong> <span id="email"></span></p>

<p><strong>Endereço:</strong> <span id="endereco"></span></p>

<p><strong>Estado:</strong> <span id="estado"></span></p>

<p><strong>CEP:</strong> <span id="cep"></span></p>

<h2>Pagamento processado com sucesso!</h2>

</div>

<script>
const dados = new URLSearchParams(window.location.search);

document.getElementById("nome").textContent =
dados.get("primeiro_nome");

document.getElementById("sobrenome").textContent =
dados.get("sobrenome");

document.getElementById("usuario").textContent =
dados.get("usuario");

document.getElementById("email").textContent =
dados.get("email");

document.getElementById("endereco").textContent =
dados.get("endereco");

document.getElementById("estado").textContent =
dados.get("estado");

document.getElementById("cep").textContent =
dados.get("cep");
</script>

</body>
</html>
